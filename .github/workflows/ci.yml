name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --save-dev html-validate

      - name: Validate HTML
        run: npx html-validate "*.html" "articles/*.html" "constellations/*.html"

      - name: Validate schedule data
        run: node ci/validate-schedule.js

      - name: Check internal links
        run: node ci/check-links.js
