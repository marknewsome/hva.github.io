<svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Telescope pointing upper-right -->
  <g transform="rotate(-45 21 21)">
    <!-- Eyepiece end -->
    <rect x="4" y="18.5" width="6" height="5" rx="1.2" fill="#48d9e8"/>
    <!-- Main tube -->
    <rect x="9" y="17.5" width="18" height="7" rx="1.5" fill="#f0c040"/>
    <!-- Objective barrel (wider) -->
    <rect x="26" y="15.5" width="7" height="11" rx="1.5" fill="#f0c040"/>
    <!-- Lens sheen -->
    <rect x="26.5" y="16" width="6" height="2" rx="1" fill="white" opacity="0.2"/>
  </g>
  <!-- Star sparkle — where the telescope points -->
  <circle cx="33" cy="8" r="1.8" fill="white" opacity="0.95"/>
  <rect x="32.3" y="4.5" width="1.4" height="7" rx="0.7" fill="white" opacity="0.6"/>
  <rect x="29.5" y="7.3" width="7" height="1.4" rx="0.7" fill="white" opacity="0.6"/>
</svg>
